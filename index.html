<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alba — Letters</title>
    <meta name="description" content="A lunar-cycle letter about where I am and what I'm up to." />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="header">
        <h1>Alba</h1>
        <p class="subhead">
          A lunar-cycle letter about where I am, what I’m building, and what I’m noticing.
          Mostly for friends. Anyone welcome.
        </p>
      </header>

      <section class="card" aria-label="Subscribe">
        <!-- For now this is a placeholder. We'll wire it up next. -->
        <form class="form" action="#" method="post" onsubmit="return fakeSubmit(event)">
          <label class="label" for="email">Email</label>
          <div class="row">
            <input
              class="input"
              id="email"
              name="email"
              type="email"
              placeholder="you@domain.com"
              autocomplete="email"
              required
            />
            <button class="button" type="submit">Subscribe</button>
          </div>
          <p class="fineprint">
            You can reply directly to the letter. Unsubscribe anytime.
          </p>
          <p class="status" id="status" role="status" aria-live="polite"></p>
        </form>
      </section>

      <footer class="footer">
        <p>© <span id="year"></span> Alba</p>
      </footer>
    </main>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();

      // Placeholder so you can deploy now without backend:
      function fakeSubmit(e) {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        const status = document.getElementById("status");
        status.textContent = email ? `Thanks — you’re on the list: ${email}` : "Enter an email.";
        e.target.reset();
        return false;
      }
    </script>
  </body>
</html>
